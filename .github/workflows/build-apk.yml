name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

# Forces the runner to use Node.js 24 for all actions, clearing your warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Wifi-WPS-Tester-Debug-APK
        # Fix: Using a wildcard ensures GitHub grabs the APK wherever Gradle puts it
        path: "**/build/outputs/apk/**/*.apk"
